<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <filter id="docShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: dark slate -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern (terminal feel) -->
  <g clip-path="url(#roundClip)" opacity="0.04">
    <line x1="0" y1="200" x2="1024" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1024" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1024" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1024" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1024" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1024" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Document shape with folded corner -->
  <g filter="url(#docShadow)">
    <path d="
      M 260 160
      L 660 160
      L 764 264
      L 764 864
      L 260 864
      Z
    " fill="url(#docGrad)"/>
    <!-- Folded corner -->
    <path d="
      M 660 160
      L 660 264
      L 764 264
      Z
    " fill="#cbd5e1"/>
  </g>

  <!-- Terminal prompt cursor: >_ -->
  <g>
    <!-- > symbol -->
    <path d="
      M 340 420
      L 440 490
      L 340 560
    " fill="none" stroke="url(#accentGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- _ underscore (blinking cursor) -->
    <line x1="470" y1="558" x2="570" y2="558" stroke="url(#accentGrad)" stroke-width="36" stroke-linecap="round"/>
  </g>

  <!-- Markdown lines (content preview) -->
  <g opacity="0.2">
    <!-- # heading indicator -->
    <rect x="340" y="330" width="120" height="12" rx="6" fill="#64748b"/>
    <rect x="480" y="330" width="200" height="12" rx="6" fill="#64748b"/>
    <!-- text lines below prompt -->
    <rect x="340" y="630" width="340" height="10" rx="5" fill="#64748b"/>
    <rect x="340" y="670" width="280" height="10" rx="5" fill="#64748b"/>
    <rect x="340" y="710" width="310" height="10" rx="5" fill="#64748b"/>
    <rect x="340" y="750" width="180" height="10" rx="5" fill="#64748b"/>
  </g>

  <!-- Accent dot (status indicator - agent active) -->
  <circle cx="700" cy="800" r="24" fill="#4ade80" opacity="0.9"/>
  <circle cx="700" cy="800" r="12" fill="#22c55e"/>
</svg>
